<!DOCTYPE html>
<html>
<head>
  <title>My App Store</title>
  <style>
    body { font-family: Arial; text-align:center; background:#f5f5f5; }
    .card {
      background:#fff;
      padding:20px;
      margin:20px auto;
      width:300px;
      border-radius:10px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }
    button {
      padding:10px 15px;
      background:black;
      color:white;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }
  </style>
</head>
<body>

<h1>My App Store</h1>
<div id="apps"></div>

<script>
fetch('data.json')
.then(res => res.json())
.then(data => {
  let container = document.getElementById('apps');
  data.forEach(app => {
    container.innerHTML += `
      <div class="card">
        <h2>${app.title}</h2>
        <p>${app.description}</p>
        <p>Version: ${app.version}</p>
        <a href="${app.link}">
          <button>Download</button>
        </a>
      </div>
    `;
  });
});
</script>

</body>
</html>
